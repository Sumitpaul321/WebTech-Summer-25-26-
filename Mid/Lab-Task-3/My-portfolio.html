<!DOCTYPE html>
<html lang="en">
<head>
<title>My Portfolio</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background-color: white;
        color: black;
        text-align: center;
    }

    .dark-mode{
        background-color: black;
        color: white;
    }

    nav a {
        margin-right: 15px;
        cursor: pointer;
    }

    section {
        display: none;
        padding: 20px;
    }

    section.active {
        display: block;
    }

    form input, form textarea{
        display: block;
        margin: 10px auto;
    }

    .error{
        color: red;
    }

    .success{
        color: green;
    }

</style>
</head>

<body>
    <h2>My Portfolio </h2>

    <nav>
        <a onclick="showSection('about')">About</a>
        <a onclick="showSection('projects')">Projects</a>
        <a onclick="showSection('contact')">Contact</a>
    </nav>

    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>

    <p id="greeting"></p>

    <section id="about" class="active">
        <h3>About Me</h3>
        <p>iam a computer science student at AIUB. i love machine learning and deep learning</p>
    </section>

    <section id="projects">
        <h3>My Projects</h3>
        <ul>
            <li>Protfolio Website</li>
            <li>Student management system</li>
            <li>weather prediction</li>
        </ul>
    </section>

    <section id="contact">
        <h3>Contact Me</h3>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required><br>
            <span class="error" id="nameError"></span><br>
           
            <input type="text" id="email" placeholder="Your Email" required><br>
            <span class="error" id="emailError"></span><br>
           
            <textarea id="message" placeholder="Your Message" required></textarea><br>
            <span class="error" id="messageError"></span><br>

            <button type="submit">Send</button>
            <p class="success" id="successMsg"></p>
        </form>
    </section>


    <script>
        function showSection(id) {
            let sections = document.querySelectorAll('section');
            sections.forEach(sec => sec.classList.remove('active'));
            document.getElementById(id).classList.add('active');
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }

    function showGreeting(){
        let hour = new Date().getHours();
        let text = "";

        if (hour < 12) {
            text = "Good Morning!";
        }
        else if (hour < 18) {
            text = "Good Afternoon!";
        } else {
            text = "Good Evening!";
        }

        document.getElementById('greeting').innerText = text;
    }

    showGreeting();

    document.getElementById('contactForm').addEventListener('submit', function(e){
        e.preventDefault();


    let name = document.getElementById('name').value.trim();
    let email = document.getElementById('email').value.trim();
    let message = document.getElementById('message').value.trim();

    let nameError = document.getElementById('nameError');
    let emailError = document.getElementById('emailError');
    let messageError = document.getElementById('messageError');
    let successMsg = document.getElementById('successMsg');

    nameError.innerText = "";
    emailError.innerText = "";
    messageError.innerText = "";
    successMsg.innerText = "";

    let valid = true;

    if(name === ""){
        nameError.innerText = "Name is required.";
        valid = false;
    }
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
        emailError.innerText = "Invalid email format.";
        valid = false;
    }

    if (message.length < 10) {
        messageError.innerText = "Message should be at least 10 characters.";
        valid = false;
    }

    if (valid) {
        successMsg.innerText = "Message sent successfully!";
        document.getElementById('contactForm').reset();
    }
    });


    </script>


</body>
</html>
