<!DOCTYPE html>
<html>
<head>
    <title>Internship Confirmation Form</title>
</head>

<body>

    <h2>Internship Confirmation Form</h2>

    <form>

        <table>

            <tr>
                <td>Student Name:</td>
                <td>
                    <input type="text" name="student-name" required>
                </td>
            </tr>

            <tr>
                <td>Email Address:</td>
                <td>
                    <input type="email" name="email" required>
                </td>
            </tr>

            <tr>
                <td>Preferred Internship Type:</td>
                <td>
                    <input type="radio" name="internship-type" value="On-Site"> On-Site
                    <br>
                    <input type="radio" name="internship-type" value="Remote"> Remote
                </td>
            </tr>

            <tr>
                <td>Internship Duration:</td>
                <td>
                    <select name="duration">
                        <option>6 Weeks</option>
                        <option>3 Months</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Skills of Interest:</td>
                <td>
                    <input type="checkbox" name="skill1"> Web Development
                    <br>
                    <input type="checkbox" name="skill2"> Data Analysis
                    <br>
                    <input type="checkbox" name="skill3"> Mobile Apps
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Final Submit">
                </td>
            </tr>

        </table>

    </form>

</body>
</html>
